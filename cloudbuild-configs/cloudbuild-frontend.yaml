steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_API_URL=https://api-pos.mitbiz.id'
      - '--build-arg'
      - 'VITE_APP_URL=https://pos.mitbiz.id/api'
      - '--build-arg'
      - 'VITE_MIDTRANS_CLIENT_KEY=${_MIDTRANS_CLIENT_KEY}'
      - '--tag'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'
      - '--tag'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_IMAGE_NAME}:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_IMAGE_NAME}:latest'

substitutions:
  _REGION: us-central1
  _PROJECT_ID: dulcet-outlook-479500-k3
  _IMAGE_NAME: frontend-pos
  _MIDTRANS_CLIENT_KEY: ''

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_IMAGE_NAME}:${COMMIT_SHA}'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_IMAGE_NAME}:latest'
