name: Deploy Frontend to Compute Engine

on:
  push:
    branches: [main]
    paths:
      - 'frontend-pos/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  PROJECT_ID: dulcet-outlook-479500-k3
  REGION: us-central1
  SERVICE_NAME: frontend-pos
  IMAGE_NAME: frontend-pos

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Enable required APIs
        run: |
          gcloud services enable compute.googleapis.com || true
          gcloud services enable artifactregistry.googleapis.com || true
          gcloud services enable cloudbuild.googleapis.com || true

      - name: Create Artifact Registry repository if not exists
        run: |
          gcloud artifacts repositories describe ${{ env.IMAGE_NAME }} --location=${{ env.REGION }} || \
          gcloud artifacts repositories create ${{ env.IMAGE_NAME }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Docker repository for ${{ env.SERVICE_NAME }}"

      - name: Get Midtrans Client Key from Secret Manager
        run: |
          MIDTRANS_CLIENT_KEY=$(gcloud secrets versions access latest --secret=midtrans-client-key)
          echo "midtrans_client_key=$MIDTRANS_CLIENT_KEY" >> $GITHUB_ENV

      - name: Build and Push Container
        run: |
          cd frontend-pos
          gcloud builds submit \
            --config=../cloudbuild-configs/cloudbuild-frontend.yaml \
            --substitutions=_REGION=${{ env.REGION }},_PROJECT_ID=${{ env.PROJECT_ID }},_IMAGE_NAME=${{ env.IMAGE_NAME }},_MIDTRANS_CLIENT_KEY=${{ env.midtrans_client_key }},COMMIT_SHA=${{ github.sha }} \
            --service-account=projects/dulcet-outlook-479500-k3/serviceAccounts/cloudbuild@dulcet-outlook-479500-k3.iam.gserviceaccount.com \
            --gcs-log-dir=gs://dulcet-outlook-479500-k3_cloudbuild/logs

      - name: Deploy to Compute Engine via SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          printf '%s' "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i /tmp/deploy_key ${{ secrets.VM_SSH_USER }}@${{ secrets.VM_EXTERNAL_IP }} "cd /opt/mitbiz-deploy && ./deploy.sh frontend '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}' '${{ github.sha }}' '${{ env.REGION }}' '${{ env.PROJECT_ID }}'"

      - name: Show deployment info
        run: |
          echo "Frontend deployed to Compute Engine"
          echo "Image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
