name: Deploy Backend to Compute Engine

on:
  push:
    branches: [main]
    paths:
      - 'backend-pos/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: dulcet-outlook-479500-k3
  REGION: us-central1
  SERVICE_NAME: backend-pos
  IMAGE_NAME: backend-pos

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Enable required APIs
        run: |
          gcloud services enable compute.googleapis.com || true
          gcloud services enable artifactregistry.googleapis.com || true
          gcloud services enable cloudbuild.googleapis.com || true
          gcloud services enable secretmanager.googleapis.com || true

      - name: Create Artifact Registry repository if not exists
        run: |
          gcloud artifacts repositories describe ${{ env.IMAGE_NAME }} --location=${{ env.REGION }} || \
          gcloud artifacts repositories create ${{ env.IMAGE_NAME }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Docker repository for ${{ env.SERVICE_NAME }}"

      - name: Build and Push Container
        run: |
          cd backend-pos
          gcloud builds submit \
            --config=../cloudbuild-configs/cloudbuild-backend.yaml \
            --substitutions=_REGION=${{ env.REGION }},_PROJECT_ID=${{ env.PROJECT_ID }},_IMAGE_NAME=${{ env.IMAGE_NAME }},COMMIT_SHA=${{ github.sha }} \
            --service-account=projects/dulcet-outlook-479500-k3/serviceAccounts/cloudbuild@dulcet-outlook-479500-k3.iam.gserviceaccount.com \
            --gcs-log-dir=gs://dulcet-outlook-479500-k3_cloudbuild/logs

      - name: Deploy to Compute Engine via SSH
        env:
          SSH_PASS: ${{ secrets.VM_SSH_PASSWORD }}
        run: |
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no ${{ secrets.VM_SSH_USER }}@${{ secrets.VM_EXTERNAL_IP }} "sudo apt-get update && sudo apt-get install -y sshpass && cd /opt/mitbiz-deploy && ./deploy.sh backend '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}' '${{ github.sha }}' '${{ env.REGION }}' '${{ env.PROJECT_ID }}'"

      - name: Show deployment info
        run: |
          echo "Backend deployed to Compute Engine"
          echo "Image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
