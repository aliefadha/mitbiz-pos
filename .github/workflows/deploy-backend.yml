name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend-pos/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: dulcet-outlook-479500-k3
  REGION: us-central1
  SERVICE_NAME: backend-pos
  IMAGE_NAME: backend-pos

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Enable required APIs
        run: |
          gcloud services enable run.googleapis.com || true
          gcloud services enable artifactregistry.googleapis.com || true
          gcloud services enable cloudbuild.googleapis.com || true
          gcloud services enable secretmanager.googleapis.com || true

      - name: Create Artifact Registry repository if not exists
        run: |
          gcloud artifacts repositories describe ${{ env.IMAGE_NAME }} --location=${{ env.REGION }} || \
          gcloud artifacts repositories create ${{ env.IMAGE_NAME }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Docker repository for ${{ env.SERVICE_NAME }}"

      - name: Build and Push Container
        run: |
          cd backend-pos
          gcloud builds submit \
            --config=../cloudbuild-configs/cloudbuild-backend.yaml \
            --substitutions=_REGION=${{ env.REGION }},_PROJECT_ID=${{ env.PROJECT_ID }},_IMAGE_NAME=${{ env.IMAGE_NAME }},COMMIT_SHA=${{ github.sha }} \
            --service-account=projects/dulcet-outlook-479500-k3/serviceAccounts/cloudbuild@dulcet-outlook-479500-k3.iam.gserviceaccount.com \
            --gcs-log-dir=gs://dulcet-outlook-479500-k3_cloudbuild/logs

      - name: Create env vars file
        run: |
          cat > env-vars.yaml << 'EOF'
          ALLOWED_ORIGINS: "https://frontend-pos-508482854424.us-central1.run.app,https://mitbizpos.baskograndmall.com,http://localhost:3000"
          API_PREFIX: "/api"
          EOF

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3001 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --min-instances 0 \
            --set-secrets=DATABASE_URL=database-url:latest,BETTER_AUTH_SECRET=better-auth-secret:latest,JWT_SECRET=jwt-secret:latest \
            --env-vars-file=env-vars.yaml
          
          # Get the deployed URL
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $SERVICE_URL"

      - name: Update service with BETTER_AUTH_URL
        run: |
          SERVICE_URL="${{ steps.deploy.outputs.service_url }}"
          echo "Setting BETTER_AUTH_URL to: $SERVICE_URL"
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --update-env-vars="BETTER_AUTH_URL=$SERVICE_URL"
