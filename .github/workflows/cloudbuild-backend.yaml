steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '--tag'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_SERVICE_NAME}:latest'
      - '.'
    dir: 'backend-pos'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_SERVICE_NAME}:${COMMIT_SHA}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_SERVICE_NAME}:latest'

substitutions:
  _REGION: us-central1
  _PROJECT_ID: dulcet-outlook-479500-k3
  _IMAGE_NAME: backend-pos
  _SERVICE_NAME: backend-pos

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_SERVICE_NAME}:${COMMIT_SHA}'
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_IMAGE_NAME}/${_SERVICE_NAME}:latest'
